[package]
name = "aphanite"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.103"
axum = "0.8.9"
base64 = "0.22.1"
clap = { version = "4.6.1", features = ["derive"] }
jiff = "0.2.31"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
shadow-rs = "2.0.0"
toasty = { version = "0.7.0", features = ["sqlite", "jiff", "serde"] }
tokio = { version = "1.52.3", features = ["full"] }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }

